backend:
  name: github
  repo: DoryTrinh/isthisworthmymoney
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "src/blog/images"
public_folder: "/blog/images"

collections:
  - name: "posts"
    label: "Blog Posts (English)"
    folder: "src/blog/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Custom Slug", name: "customSlug", widget: "string", required: false, hint: "Override the URL slug (e.g. 'my-custom-url'). Leave empty to use the auto-generated slug from the title. No slashes, no diacritics." }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: ["post"]
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Translation Slug", name: "translationSlug", widget: "string", required: false, hint: "Slug of the Vietnamese version (e.g. 'quy-tac-50-30-20'). Leave empty if no translation exists." }
      - { label: "Language", name: "lang", widget: "hidden", default: "en" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "posts_vi"
    label: "Blog Posts (Vietnamese)"
    folder: "src/blog/posts/vi"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Custom Slug", name: "customSlug", widget: "string", required: false, hint: "Override the URL slug (e.g. 'chi-phi-lam-viec-tu-xa'). Leave empty to use the auto-generated slug from the title. No slashes, no diacritics." }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: ["post"]
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Translation Slug", name: "translationSlug", widget: "string", required: false, hint: "Slug of the English version (e.g. '50-30-20-rule'). Leave empty if no translation exists." }
      - { label: "Language", name: "lang", widget: "hidden", default: "vi" }
      - { label: "Body", name: "body", widget: "markdown" }
